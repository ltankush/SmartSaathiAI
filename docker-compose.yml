version: "3.9"

services:
  smartsaathi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsaathi
    env_file: ./backend/.env
    environment:
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost:8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
